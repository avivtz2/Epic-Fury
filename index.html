<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITUATION ROOM - מבצע Epic Fury</title>
    
    <!-- טעינת Tailwind לעיצוב -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- טעינת Babel כדי לאפשר כתיבת רכיבי React ישירות בדפדפן -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- טעינת html2canvas ליצירת צילום מסך (להורדת התעודה) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* ייבוא גופן עברי תואם */
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
        
        html, body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #020617;
            overflow: hidden; /* מניעת גלילה מוחלטת */
            width: 100%;
            height: 100%;
        }

        #root {
            height: 100%;
        }

        /* אנימציות */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        .animate-slide-bottom { animation: slideInBottom 0.4s ease-out forwards; }

        /* Scrollbar נסתר אך שמיש במקרה חירום */
        .custom-scroll { overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const ShieldAlert = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>);
        const Globe = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);
        const Users = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const Zap = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>);
        const AlertTriangle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
        const Crosshair = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>);
        const Briefcase = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>);
        const Activity = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
        const BookOpen = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>);
        const ChevronLeft = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>);
        const Droplet = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>);
        const CheckCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>);
        const Info = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>);
        const HistoryIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>);
        const XIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);
        const AwardIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>);
        const DownloadIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);

        // --- DYNAMIC QUIZ DATA ---
        const CONCEPT_QUESTIONS = {
          'עוצמה רכה (Soft Power)': { question: "מהי 'עוצמה רכה' ביחסים בינלאומיים?", options: ["היכולת להשיג יעדים באמצעות שכנוע, משיכה ושיתוף פעולה", "שימוש בכוח צבאי מוגבל", "סנקציות כלכליות בלבד"], correctIndex: 0 },
          'לוחמה אסימטרית': { question: "למה מתייחס המושג 'לוחמה אסימטרית'?", options: ["מלחמה בין שתי מעצמות ענק", "שימוש באמצעים לא-קונבנציונליים על ידי צד חלש טכנולוגית", "הסכם שלום שאינו שוויוני"], correctIndex: 1 },
          'דילמת הביטחון (Security Dilemma)': { question: "מהי 'דילמת הביטחון'?", options: ["צעדים הגנתיים שנתפסים כאיום על ידי היריב וגוררים התחמשות נגדית", "התלבטות של מנהיג בין הפעלת כוח צבאי לסנקציות", "החובה להגן על בעלות ברית"], correctIndex: 0 },
          'ערוץ אחורי (Backchannel Diplomacy)': { question: "מהו היתרון של דיפלומטיה ב'ערוץ אחורי'?", options: ["מבטיח תמיכת או\"ם", "מאפשר גמישות ומו\"מ ללא לחץ ציבורי ופוליטי", "מחייב מעורבות תקשורתית"], correctIndex: 1 },
          'משחק על הסף (Brinkmanship)': { question: "מהי אסטרטגיית 'משחק על הסף'?", options: ["נסיגה מוחלטת לעמדות הגנה", "דחיפת משבר בכוונה אל סף עימות כדי לאלץ את היריב לסגת", "מו\"מ ארוך להתרשת היריב"], correctIndex: 1 },
          'הגמוניה (Hegemony)': { question: "איזה מצב מתאר 'הגמוניה'?", options: ["שוויון מוחלט בין מדינות", "מצב בו מעצמה אחת דומיננטית ויכולה לכפות את רצונה", "פירוק נשק גלובלי"], correctIndex: 1 },
          'הרתעה מורחבת (Extended Deterrence)': { question: "מהי 'הרתעה מורחבת'?", options: ["פיתוח יכולות צבאיות מקיפות להגנת המולדת", "התחייבות מעצמה להגן על בנות בריתה מאיום חיצון בתגובת נגד", "שימוש בסנקציות במקום כוח"], correctIndex: 1 },
          'משחק דו-מפלסי (Two-Level Game)': { question: "מה מתארת תיאוריית 'המשחק הדו-מפלסי'?", options: ["ניהול מו\"מ צבאי בים ובאוויר", "הפעלת קואליציות נגד מספר אויבים", "מנהיג המנהל מו\"מ מול מדינות זרות ומול פוליטיקה מבית במקביל"], correctIndex: 2 },
          'מאזן כוחות (Balance of Power)': { question: "כיצד מושגת יציבות לפי 'מאזן כוחות'?", options: ["פירוק נשק", "בריתות והתחמשות למניעת עליונות מוחלטת של מדינה אחת", "כפיפות מלאה לאו\"ם"], correctIndex: 1 },
          'הכלכלה הפוליטית הבינלאומית (IPE)': { question: "מהי הנחת היסוד של ה-IPE?", options: ["משברים גיאופוליטיים שזורים בשווקים כלכליים שמשפיעים על החלטות", "ניתוק הכלכלה מפוליטיקה", "סנקציות ככלי דיפלומטי יחיד"], correctIndex: 0 },
          'חופש השיט (Freedom of Navigation)': { question: "למה מעצמות מגינות צבאית על 'חופש השיט'?", options: ["להבטחת תנועת סחר ומים בינלאומיים ללא איום", "להגנת ספינות תיירות", "לגביית מיסי מעבר"], correctIndex: 0 },
          'רב-קוטביות (Multipolarity)': { question: "מהי מערכת 'רב-קוטבית'?", options: ["הגמון אחד", "שתי מעצמות על", "יותר משתי מעצמות גדולות המתחרות על השפעה"], correctIndex: 2 },
          'כפייה (Compellence)': { question: "מה ההבדל בין 'כפייה' ל'הרתעה'?", options: ["כפייה מיועדת לעצור פעולה שכבר החלה, הרתעה מונעת אותה מראש", "אין הבדל", "הרתעה היא צבאית וכפייה כלכלית"], correctIndex: 0 },
          'ניהול משברים (Crisis Management)': { question: "מהי מטרת 'ניהול משברים' צבאיים?", options: ["הכרעה מהירה", "שליטה ברמות אלימות ופתיחת תקשורת למניעת מלחמה כוללת", "העברת הטיפול להאג"], correctIndex: 1 },
          'פיוס (Appeasement)': { question: "מהי מדיניות 'פיוס'?", options: ["מתן ויתורים למדינה תוקפנית בתקווה להימנע ממלחמה", "שימוש בכוח מאסיבי", "חתימה על ברית הגנה"], correctIndex: 0 },
          'אמינות האיום (Threat Credibility)': { question: "מתי איום נחשב 'אמין'?", options: ["כשהוא פומבי", "כשיש גם יכולת צבאית וגם נכונות פוליטית לממש אותו", "כשהוא מלווה בהצעת סיוע"], correctIndex: 1 },
          'דיפלומטיית פסגה (Summit Diplomacy)': { question: "מהו החיסרון ב'דיפלומטיית פסגה' (מפגש מנהיגים)?", options: ["מחייבת משאל עם", "אם נכשלת - אין דרג גבוה יותר לפנות אליו להצלת המצב", "דורשת אישור או\"ם"], correctIndex: 1 },
          'הכלה (Containment)': { question: "מהי אסטרטגיית 'הכלה'?", options: ["מניעת התפשטות השפעת היריב למדינות נוספות ללא מלחמה ישירה לחיסולו", "כיבוש והפלת משטר", "התעלמות מהאויב"], correctIndex: 0 },
          'תקיפה מונעת (Preventive Strike)': { question: "במה שונה 'תקיפה מונעת' ממקדימה?", options: ["מבוצעת בסייבר", "תקיפת איום עתידי מתהווה (גרעין), להבדיל מאיום מיידי וברור", "מחייבת הצבעת או\"ם"], correctIndex: 1 },
          'הסכם ביניים טקטי': { question: "מתי משתמשים ב'הסכם ביניים טקטי'?", options: ["לפתרון שורש הסכסוך לעד", "להקפאת מצב, קניית זמן ומניעת הידרדרות מבלי לפתור את הליבה", "לאחר הכנעה צבאית"], correctIndex: 1 },
          'תיאוריה ליברלית-מוסדית': { question: "כיצד יושג שלום לפי התיאוריה הליברלית-מוסדית?", options: ["חימוש אגרסיבי", "מוסדות משותפים (כמו או\"ם) והסכמים המשנים אינטרסים של מדינות", "בידוד מדיני"], correctIndex: 1 },
          'ריאליזם דפנסיבי': { question: "מדוע לא ממהרים לתקוף מדינה עם נשק גרעיני (לפי ריאליזם דפנסיבי)?", options: ["אמון בכוונות טובות", "מדינות שואפות להישרדות ויעדיפו לאזן את האיום במקום להסתכן בהשמדה מתקיפה", "נשק גרעיני אינו איום"], correctIndex: 1 }
        };

        // --- GAME DATA ---
        const INITIAL_METRICS = { escalation: 30, legitimacy: 70, domestic: 60, nuclear: 65, oilPrice: 85 };

        const getEvents = (gender) => [
          {
            turn: 1, title: 'שלב 1: האיראנים מתקרבים לפצצה גרעינית',
            description: 'איראן החלה בהעשרת אורניום ל-90% בפורדו. אם לא נפעל, יהיה להם חומר בקיע תוך שבועות. נדרשת תגובה מיידית.',
            icon: <AlertTriangle className="w-8 h-8 md:w-14 md:h-14 lg:w-16 lg:h-16 text-red-500" />,
            choices: [
              { text: 'סנקציות כלכליות דרך מועצת הביטחון', effects: { escalation: -5, legitimacy: +15, domestic: -10, nuclear: +10, oilPrice: +5 }, feedback: `האו"ם מגיב לאט. איראן ממשיכה להעשיר. תפיסת ${gender==='M'?'הנשיא כחלש':'הנשיאה כחלשה'} גוברת מבית.`, concept: { name: 'עוצמה רכה (Soft Power)', desc: 'השגת יעדים באמצעות שכנוע ושיתוף פעולה בינלאומי.' } },
              { text: 'מתקפת סייבר התקפית חשאית', effects: { escalation: +10, legitimacy: -5, domestic: +5, nuclear: -10, oilPrice: +2 }, feedback: 'הצנטריפוגות עוכבו, אך איראן העלתה כוננות צבאית מחשש לתקיפה רחבה.', concept: { name: 'לוחמה אסימטרית', desc: 'שימוש באמצעים לא קונבנציונליים לעקיפת עוצמה צבאית.' } },
              { text: 'קידום כוח ימי ואיום פומבי', effects: { escalation: +20, legitimacy: -15, domestic: +15, nuclear: -5, oilPrice: +15 }, feedback: 'הפגנת הכוח הרתיעה זמנית, אך השווקים בפאניקה וההסלמה זינקה.', concept: { name: 'דילמת הביטחון (Security Dilemma)', desc: 'צעד הגנתי נתפס כאיום וגורר התחמשות והסלמה מעגלית.' } }
            ]
          },
          {
            turn: 2, title: 'שלב 2: משבר הפקחים',
            description: 'איראן גירשה הבוקר את פקחי סבא"א, שבלעדיהם המודיעין מאבד את יכולת המעקב אחר הרכבת פצצה צבאית.',
            icon: <Briefcase className="w-8 h-8 md:w-14 md:h-14 lg:w-16 lg:h-16 text-slate-500" />,
            choices: [
              { text: 'הצעה חשאית בעומאן להחזרת פקחים תמורת הקלות', effects: { escalation: -10, legitimacy: +5, domestic: -15, nuclear: +5, oilPrice: -5 }, feedback: 'הערוץ החשאי הרגיע שווקים, אך הדלפות עוררו זעם בקונגרס.', concept: { name: 'ערוץ אחורי (Backchannel Diplomacy)', desc: 'מו"מ חשאי המאפשר גמישות ללא לחץ ציבורי.' } },
              { text: 'אולטימטום פומבי או צעדים צבאיים', effects: { escalation: +15, legitimacy: -5, domestic: +10, nuclear: 0, oilPrice: +12 }, feedback: 'האיום הציבורי דחק את איראן לפינה וגרם לזינוק במחירי האנרגיה.', concept: { name: 'משחק על הסף (Brinkmanship)', desc: 'דחיפת המשבר לסף עימות כדי לאלץ את היריב לסגת.' } },
              { text: 'סנקציות על חברות סיניות הסוחרות עם איראן', effects: { escalation: +5, legitimacy: -20, domestic: 0, nuclear: -5, oilPrice: +8 }, feedback: 'הכלכלה האיראנית נפגעה, אך שימוש בכלכלת ארה"ב כנשק פגע בלגיטימציה בסין ואירופה.', concept: { name: 'הגמוניה (Hegemony)', desc: 'מעצמה המשתמשת בכוחה הכלכלי כדי לכפות את רצונה.' } }
            ]
          },
          {
            turn: 3, title: 'שלב 3: הלחץ האזורי',

            icon: <Zap className="w-8 h-8 md:w-14 md:h-14 lg:w-16 lg:h-16 text-red-600" />,
            choices: [

          {

            description: `חומר הבקיע האיראני מוכן. המזרח התיכון על סף רתיחה. עליך לקבל החלטה סופית שתקבע את המורשת ${gender==='M'?'שלך':'שלך'}.`,
            icon: <ShieldAlert className="w-8 h-8 md:w-14 md:h-14 lg:w-16 lg:h-16 text-slate-800" />,
            choices: [
              { text: 'תקיפה מונעת כוללת להשמדת מתקני הגרעין', effects: { escalation: +40, legitimacy: -30, domestic: +10, nuclear: -80, oilPrice: +60 }, feedback: 'הפצצה נבלמה, אך איראן מבעירה את מיצר הורמוז ומחיר מלחמה נגבה.', concept: { name: 'תקיפה מונעת (Preventive Strike)', desc: 'השמדת איום עתידי (טרם הבשיל) באמצעות כוח צבאי.' } },
              { text: 'הסכם ביניים: הקפאה תמורת הפשרת כספים בסיסית', effects: { escalation: -15, legitimacy: +10, domestic: -5, nuclear: -10, oilPrice: -15 }, feedback: 'הושג שקט זמני והכלכלה ניצלה, למרות שאיראן נותרה קרובה מאוד לסף הגרעיני.', concept: { name: 'הסכם ביניים טקטי', desc: 'הקפאת המצב למניעת הידרדרות ללא פתרון בעיות השורש.' } },
              { text: 'חזרה מלאה להסכם הגרעין: פיקוח הדוק תמורת הסרת סנקציות', effects: { escalation: -30, legitimacy: +25, domestic: -20, nuclear: -30, oilPrice: -35 }, feedback: 'העולם מברך והנפט צונח, אך בעלות הברית מרגישות נבגדות מהסרת הלחץ.', concept: { name: 'תיאוריה ליברלית-מוסדית', desc: 'פתרון סכסוכים דרך מוסדות בינלאומיים והסכמים משותפים.' } },
              { text: 'הכלה והרתעה: השלמה עם איראן גרעינית', effects: { escalation: -10, legitimacy: -15, domestic: -30, nuclear: +25, oilPrice: +15 }, feedback: 'מלחמה נמנעה, אך ארה"ב נדרשת לשנות אסטרטגיה מול מזרח תיכון גרעיני וזועם.', concept: { name: 'ריאליזם דפנסיבי', desc: 'העדפת איזון כוחות (התרעה הדדית) על פני פתיחה במלחמה יזומה.' } }
            ]
          }
        ];

        // --- COMPONENTS ---
        const MetricPill = ({ label, value, colorClass, icon: Icon, unit = "%", dangerThreshold, invertWarning, onClick }) => {
          let percentage = Math.max(0, Math.min(100, (value / (unit==='$'?200:100)) * 100));
          let isDanger = dangerThreshold ? (invertWarning ? value < dangerThreshold : value > dangerThreshold) : (invertWarning ? percentage < 30 : percentage > 70);
          
          return (
            <button 
              onClick={() => onClick({label, desc: label==="הסלמה"?"סיכון למלחמה כוללת":label==="לגיטימציה"?"תמיכת הקהילה הבינלאומית":label==="פנים"?"גיבוי הקונגרס ודעת הקהל":label==="גרעין"?"המרחק של איראן מפצצה גרעינית":"השפעה ישירה על יוקר המחיה מבית"})}
              className={`flex-1 flex flex-col items-center justify-center py-1.5 md:py-3 lg:py-4 px-0.5 rounded border transition-all ${isDanger ? 'bg-red-950/60 border-red-500/60 animate-pulse' : 'bg-slate-800/80 border-slate-700/80 hover:bg-slate-700'}`}
            >
              <div className="flex items-center gap-1 md:gap-2">
                <Icon className={`w-3.5 h-3.5 sm:w-4 sm:h-4 md:w-6 md:h-6 lg:w-8 lg:h-8 ${colorClass}`} />
                <span className="font-mono text-xs sm:text-sm md:text-xl lg:text-2xl font-bold text-slate-200" dir="ltr">{unit==='$'?'$':''}{value}{unit==='%'?'%':''}</span>
              </div>
              <span className="text-[10px] md:text-sm lg:text-base text-slate-400 whitespace-nowrap mt-[1px] md:mt-1 font-medium">{label}</span>
            </button>
          );
        };

        const Modal = ({ title, onClose, children }) => (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in">
             <div className="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md md:max-w-xl lg:max-w-3xl max-h-[85vh] flex flex-col overflow-hidden animate-zoom-in">
                <div className="flex justify-between items-center p-4 md:p-6 border-b border-slate-800 bg-slate-950/50">
                   <h3 className="font-bold text-slate-200 md:text-xl lg:text-2xl">{title}</h3>
                   <button onClick={onClose} className="text-slate-400 hover:text-white p-1 md:p-2"><XIcon className="w-5 h-5 md:w-8 md:h-8"/></button>
                </div>
                <div className="p-4 md:p-6 overflow-y-auto custom-scroll flex-1">
                   {children}
                </div>
             </div>
          </div>
        );

        function IranCrisisGame() {
          const [currentScreen, setCurrentScreen] = useState('splash');
          const [playerName, setPlayerName] = useState('');
          const [gender, setGender] = useState('M'); 
          const [currentTurn, setCurrentTurn] = useState(0);
          const [metrics, setMetrics] = useState(INITIAL_METRICS);
          const [history, setHistory] = useState([]);
          
          const [showFeedback, setShowFeedback] = useState(false);
          const [lastChoice, setLastChoice] = useState(null);
          const [isGameOver, setIsGameOver] = useState(false);
          
          const [isHistoryOpen, setIsHistoryOpen] = useState(false);
          const [activeMetricInfo, setActiveMetricInfo] = useState(null);

          const [quizActive, setQuizActive] = useState(false);
          const [activeQuizQuestions, setActiveQuizQuestions] = useState([]);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [selectedQuizOption, setSelectedQuizOption] = useState(null);
          const [quizScore, setQuizScore] = useState(0);
          const [quizCompleted, setQuizCompleted] = useState(false);

          const [debriefActive, setDebriefActive] = useState(false);
          const [insight1, setInsight1] = useState('');
          const [insight2, setInsight2] = useState('');

          const EVENTS = getEvents(gender);
          const currentEvent = EVENTS[currentTurn];

          const handleChoice = (choice) => {
            setHistory(prev => [...prev, { turn: currentEvent.turn, title: currentEvent.title, choiceText: choice.text, conceptName: choice.concept.name, effects: choice.effects }]);
            const newMetrics = {
              escalation: Math.max(0, Math.min(100, metrics.escalation + choice.effects.escalation)),
              legitimacy: Math.max(0, Math.min(100, metrics.legitimacy + choice.effects.legitimacy)),
              domestic: Math.max(0, Math.min(100, metrics.domestic + choice.effects.domestic)),
              nuclear: Math.max(0, Math.min(100, metrics.nuclear + choice.effects.nuclear)),
              oilPrice: Math.max(20, Math.min(250, metrics.oilPrice + choice.effects.oilPrice)),
            };
            setMetrics(newMetrics);
            setLastChoice(choice);
            setShowFeedback(true);
          };

          const nextStage = () => {
            setShowFeedback(false);
            if (currentTurn >= EVENTS.length - 1) setIsGameOver(true);
            else setCurrentTurn(prev => prev + 1);
          };

          const startQuiz = () => {
             const uniqueConcepts = [...new Set(history.map(h => h.conceptName))].filter(name => CONCEPT_QUESTIONS[name]);
             for (let i = uniqueConcepts.length - 1; i > 0; i--) {
                 const j = Math.floor(Math.random() * (i + 1));
                 [uniqueConcepts[i], uniqueConcepts[j]] = [uniqueConcepts[j], uniqueConcepts[i]];
             }
             setActiveQuizQuestions(uniqueConcepts.slice(0, 4).map(c => CONCEPT_QUESTIONS[c]));
             setQuizActive(true);
          };

          const handleNextQuizQuestion = () => {
             if (selectedQuizOption === activeQuizQuestions[currentQuestionIndex].correctIndex) {
                 setQuizScore(prev => prev + 1);
             }
             if (currentQuestionIndex < activeQuizQuestions.length - 1) {
                 setSelectedQuizOption(null);
                 setCurrentQuestionIndex(prev => prev + 1);
             } else {
                 setQuizActive(false);
                 setDebriefActive(true); 
             }
          };

          const resetGame = () => {
            setMetrics(INITIAL_METRICS); setCurrentTurn(0); setShowFeedback(false); setIsGameOver(false);
            setLastChoice(null); setHistory([]); setQuizActive(false); setActiveQuizQuestions([]);
            setCurrentQuestionIndex(0); setSelectedQuizOption(null); setQuizScore(0); setQuizCompleted(false); setIsHistoryOpen(false);
            setDebriefActive(false); setInsight1(''); setInsight2(''); setPlayerName('');
            setCurrentScreen('splash');
          };

          const handleDownloadCertificate = () => {
            const certElement = document.getElementById('certificate-container');
            if (!certElement) return;
            
            // צילום המסך מתבצע באופן חלקי כשהאלמנט בתוך עוטף נגלל.
            // עוטפים את יצירת התמונה כדי לוודא שאין חיתוך.
            html2canvas(certElement, {
                backgroundColor: '#0f172a',
                scale: 2,
                windowWidth: certElement.scrollWidth,
                windowHeight: certElement.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `סיכום-מבצע-Epic-Fury-${playerName || 'מבצע'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
          };

          const renderImpactInline = (effects) => {
            const labels = { escalation: 'הסלמה', legitimacy: 'לגיטימציה', domestic: 'פנים', nuclear: 'גרעין', oilPrice: 'נפט' };
            return (
              <div className="flex flex-wrap gap-1.5 md:gap-3 justify-center">
                {Object.entries(effects).map(([key, val]) => {
                  if (val === 0) return null;
                  const isPos = (key === 'legitimacy' || key === 'domestic') ? val > 0 : val < 0;
                  return (
                    <span key={key} className={`text-[10px] sm:text-xs md:text-sm lg:text-base font-mono font-bold px-1.5 py-0.5 md:px-3 md:py-1 rounded border ${isPos ? 'bg-green-900/30 text-green-400 border-green-700/50' : 'bg-red-900/30 text-red-400 border-red-700/50'}`}>
                      {labels[key]} <span dir="ltr">{val>0?'+':''}{val}{key==='oilPrice'?'$':''}</span>
                    </span>
                  );
                })}
              </div>
            );
          };

          const renderHistoryImpact = (effects) => {
            if (!effects) return null;
            const labels = { escalation: 'הסלמה', legitimacy: 'לגיטימציה', domestic: 'פנים', nuclear: 'גרעין', oilPrice: 'נפט' };
            return (
              <div className="flex flex-wrap gap-1 justify-start mt-2 border-t border-slate-700/50 pt-2">
                {Object.entries(effects).map(([key, val]) => {
                  if (val === 0) return null;
                  const isPos = (key === 'legitimacy' || key === 'domestic') ? val > 0 : val < 0;
                  return (
                    <span key={key} className={`text-[9px] sm:text-[10px] font-mono font-bold px-1 py-0.5 rounded border ${isPos ? 'bg-green-900/30 text-green-400 border-green-700/50' : 'bg-red-900/30 text-red-400 border-red-700/50'}`}>
                      {labels[key]} <span dir="ltr">{val>0?'+':''}{val}{key==='oilPrice'?'$':''}</span>
                    </span>
                  );
                })}
              </div>
            );
          };

          const getEndingDetails = () => {
            if (metrics.nuclear >= 90) return { title: 'איראן גרעינית', desc: 'חציית קו אדום והשגת פצצה. מעמד ההגמוניה של ארה"ב ספג מכה היסטורית.', color: 'text-purple-400' };
            if (metrics.escalation >= 85 || metrics.oilPrice >= 150) return { title: metrics.oilPrice>=150?'משבר כלכלי גלובלי':'מלחמה אזורית הרסנית', desc: metrics.oilPrice>=150?`מחיר הנפט זינק ל-${metrics.oilPrice}$ וריסק את הכלכלה.`:'ההסלמה יצאה משליטה למלחמה ישירה והרסנית.', color: 'text-red-500' };
            if (metrics.legitimacy >= 65 && metrics.nuclear < 80 && metrics.oilPrice < 100) return { title: 'הצלחה דיפלומטית-מוסדית', desc: 'הכלת המשבר דרך כלים דיפלומטיים. הפצצה עוכבה ללא מלחמה.', color: 'text-green-400' };
            return { title: 'הסטטוס קוו', desc: 'איראן כמדינת סף. נמנעת ממלחמה כוללת, אך האזור דורש הרתעה מתמדת.', color: 'text-slate-300' };
          };

          return (
            <div className="h-full w-full bg-slate-950 flex flex-col overflow-hidden relative" dir="rtl" style={{ backgroundImage: 'url("https://pic1.calcalist.co.il/PicServer3/2017/01/22/697914/20.jpg")', backgroundSize: 'cover', backgroundPosition: 'center' }}>
              <div className="absolute inset-0 bg-slate-950/70 z-0"></div>

              {/* Modals */}
              {activeMetricInfo && (
                <Modal title={activeMetricInfo.label} onClose={() => setActiveMetricInfo(null)}>
                   <p className="text-slate-300 text-sm md:text-xl lg:text-2xl leading-relaxed text-center">{activeMetricInfo.desc}</p>
                </Modal>
              )}

                             </div>
                          </div>
                          <button onClick={nextStage} className="w-full py-3 md:py-4 bg-slate-700 text-white font-bold md:text-lg lg:text-xl rounded-lg border border-slate-600 flex justify-center items-center gap-2 shrink-0 transition-transform hover:scale-105">
                            {gender==='M'?'המשך לשלב הבא':'המשיכי לשלב הבא'} <ChevronLeft className="w-4 h-4 md:w-5 md:h-5" />
                          </button>
                        </div>
                      ) : (
                        <div className="flex flex-col h-full animate-fade-in overflow-y-auto custom-scroll pr-1 pb-1">
                          <div className="flex items-center gap-3 md:gap-4 mb-3 md:mb-5 shrink-0">
                            <div className="p-2 md:p-3 bg-slate-950 rounded-full border border-slate-800">{currentEvent.icon}</div>
                            <h2 className="text-base sm:text-lg md:text-xl lg:text-2xl font-bold text-slate-100 leading-tight">{currentEvent.title}</h2>
                          </div>
                          <div className="text-sm sm:text-base md:text-base lg:text-lg text-slate-300 leading-snug md:leading-relaxed shrink-0 mb-4">
                            {currentEvent.description}
                          </div>
                          <div className="flex flex-col gap-2 md:gap-3 shrink-0 mb-2 mt-auto">
                            {currentEvent.choices.map((choice, index) => (
                              <button key={index} onClick={() => handleChoice(choice)} className="w-full text-right p-2.5 md:p-4 lg:p-5 bg-slate-800/90 border border-slate-600 rounded-lg flex justify-between items-center group hover:bg-slate-700 transition-all">
                                <span className="text-xs sm:text-sm md:text-base lg:text-lg font-semibold text-slate-200 leading-tight md:leading-relaxed pl-2 md:pl-4">{choice.text}</span>
                                <ChevronLeft className="w-4 h-4 md:w-5 md:h-5 text-slate-500 shrink-0" />
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IranCrisisGame />);
    </script>
</body>
</html>
